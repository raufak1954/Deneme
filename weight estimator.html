<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Steel Weight Estimator</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; color: #333; }
        .container { max-width: 500px; background: #f4f4f4; padding: 20px; border-radius: 8px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #fff; border-left: 5px solid #007bff; display: none; }
        .note { font-size: 0.85em; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Steel Weight Estimator (St 37)</h2>
    
    <label for="span">Span per Bay (meters):</label>
    <input type="number" id="span" placeholder="e.g. 12 to 24" min="10" max="30">

    <label for="numSpans">Number of Spans:</label>
    <input type="number" id="numSpans" placeholder="e.g. 1, 2, or 3" min="1" max="5">

    <label for="length">Total Building Length (meters):</label>
    <input type="number" id="length" placeholder="e.g. 60">

    <button onclick="calculateWeight()">Estimate Tonnage</button>

    <div id="result">
        <strong>Estimated Results:</strong>
        <p id="unitWeight"></p>
        <p id="totalWeight"></p>
        <div class="note">*Includes 15% for connections and standard bracing.</div>
    </div>
</div>

<script>
    function calculateWeight() {
        const L = parseFloat(document.getElementById('span').value);
        const N = parseFloat(document.getElementById('numSpans').value);
        const B = parseFloat(document.getElementById('length').value);
        
        if (!L || !N || !B) {
            alert("Please fill in all fields.");
            return;
        }

        // Logic based on the kg/m2 trends for St 37
        // Base frame weight increases non-linearly with span
        let frameBase = 0.05 * Math.pow(L, 2) + 0.5 * L; 
        
        // Multi-span efficiency factor (approx 15% reduction for rafters)
        if (N > 1) { frameBase *= 0.85; }

        let secondary = 6.5; // Average kg/m2 for 6m bays
        let bracing = 3.5;   // Average kg/m2 for bracing
        
        // Apply 15% for connections
        let totalUnitWeight = (frameBase + secondary + bracing) * 1.15;
        
        let area = L * N * B;
        let totalTons = (totalUnitWeight * area) / 1000;

        document.getElementById('result').style.display = 'block';
        document.getElementById('unitWeight').innerText = "Unit Weight: " + totalUnitWeight.toFixed(2) + " kg/m²";
        document.getElementById('totalWeight').innerText = "Total Estimated Tonnage: " + totalTons.toFixed(2) + " Tons";
    }
</script>

</body>
</html>
