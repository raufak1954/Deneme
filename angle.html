<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Rauf - Köşebent Analizör (Revize)</title>
    <style>
        :root { --steel: #2c3e50; --gold: #f39c12; --grid: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; background: var(--grid); padding: 20px; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid var(--gold); margin-bottom: 20px; padding-bottom: 10px; }
        
        .main-content { display: flex; gap: 20px; align-items: start; }
        .input-results-area { flex: 1; }
        .diagram-area { width: 220px; text-align: center; }

        .input-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        label { font-size: 14px; font-weight: bold; color: var(--steel); }
        input { width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; text-align: center; font-size: 16px; }
        input:focus { border-color: var(--gold); outline: none; }

        button { width: 100%; padding: 15px; background: var(--steel); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        button:hover { background: #34495e; }

        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #eef2f3; padding: 20px; border-radius: 12px; }
        .res-item { font-size: 14px; color: #666; border-bottom: 1px solid #dfe6e9; padding-bottom: 5px; }
        .res-item b { color: var(--steel); font-size: 17px; display: block; margin-top: 3px; }

        canvas { background: white; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color:var(--steel);">Eşitkenar Köşebent (L) Analizi</h2>
        <small style="color:#7f8c8d;">Geliştirilmiş Mühendislik Hesaplama</small>
    </div>

    <div class="main-content">
        <div class="input-results-area">
            <div class="input-group">
                <label>Kenar (a - mm):</label>
                <input type="number" id="a" value="50">
            </div>
            <div class="input-group">
                <label>Et Kalınlığı (t - mm):</label>
                <input type="number" id="t" value="5">
            </div>

            <button onclick="calculateAndUpdate()">🔧 HESAPLA VE ÇİZ</button>

            <div class="results" id="output">
                <div class="res-item">Alan (A):<br><b id="resA">--</b> cm²</div>
                <div class="res-item">Ağırlık (G):<br><b id="resG">--</b> kg/m</div>
                <div class="res-item">Eks. Mes (cx = cy):<br><b id="resCx">--</b> cm</div>
                <div class="res-item">Ix = Iy (Geom):<br><b id="resIx">--</b> cm⁴</div>
                <div class="res-item">Imax (u-u):<br><b id="resImax">--</b> cm⁴</div>
                <div class="res-item">Imin (v-v):<br><b id="resImin">--</b> cm⁴</div>
                <div class="res-item">ix = iy (Radius):<br><b id="resix">--</b> cm</div>
                <div class="res-item">imin (v-v radius):<br><b id="resimin">--</b> cm</div>
            </div>
        </div>

        <div class="diagram-area">
            <label>Kesit ve Asal Eksenler</label>
            <canvas id="lCanvas" width="200" height="200"></canvas>
            <small style="color:#7f8c8d; font-size:11px;">(Şekil ölçekli değildir)</small>
        </div>
    </div>
</div>

<script>
function calculateAndUpdate() {
    // 1. Girdileri Al (mm -> cm)
    const a_mm = parseFloat(document.getElementById('a').value);
    const t_mm = parseFloat(document.getElementById('t').value);
    
    if (t_mm >= a_mm || t_mm <= 0 || a_mm <= 0) {
        alert("Geçersiz ölçüler! Et kalınlığı kenardan büyük olamaz.");
        return;
    }

    const a = a_mm / 10; 
    const t = t_mm / 10;

    // 2. Statik Hesaplamalar (R1/R2 ihmal edilmiş hassas geometrik formüller)
    
    // Kesit Alanı (A)
    const A = (2 * a - t) * t;
    
    // Ağırlık Merkezi Mesafesi (cx = cy)
    const cx = (a*a*t - t*t*(a - t/2)) / (2 * A);

    // Geometrik Eksenlerde Atalet Momenti (Ix = Iy)
    // Paralel eksen teoremi: I_local + A_local * d^2
    const I_local_rect = (t * Math.pow(a, 3)) / 12; // Dikdörtgen parça 1
    const I_local_flat = ((a - t) * Math.pow(t, 3)) / 12; // Dikdörtgen parça 2

    const d1 = (a / 2) - cx; // Parça 1 merkezi ile cx mesafesi
    const d2 = cx - (t / 2); // Parça 2 merkezi ile cx mesafesi

    // Hatalı eksi çıkma ihtimalini ortadan kaldıran düzgün toplama
    const Ix = (I_local_rect + (a * t) * Math.pow(d1, 2)) + (I_local_flat + ((a - t) * t) * Math.pow(d2, 2));
    const Iy = Ix; // Eşit kenar olduğu için

    // Çarpım Atalet Momenti (Ixy) - En hassas kısım burası
    // Ixy = Integral(x*y dA) - cx*cy*A -> Basitleştirilmiş
    const Ixy = (Math.pow(a,2) * Math.pow(t,2)) / 4 - A * Math.pow(cx, 2);

    // Asal Atalet Momentleri (Imax, Imin)
    // L profilde Ixy her zaman eksidir, bu yüzden Imax = Ix + |Ixy|
    const absIxy = Math.abs(Ixy);
    const Imax = Ix + absIxy; // u-u ekseni
    const Imin = Ix - absIxy; // v-v ekseni (En zayıf eksen)

    // Atalet Yarıçapları (Radius of Gyration)
    // Kök içini pozitife sabitledik (Matematiksel hata önlemi)
    const ix = Math.sqrt(Math.max(0, Ix / A));
    const imin = Math.sqrt(Math.max(0, Imin / A));

    // Ağırlık (kg/m) - Çelik özağırlık 7850 kg/m3
    const G = A * 0.785;

    // 3. Sonuçları Ekrana Yazdır
    document.getElementById('resA').innerText = A.toFixed(2);
    document.getElementById('resG').innerText = G.toFixed(2);
    document.getElementById('resCx').innerText = cx.toFixed(2);
    document.getElementById('resIx').innerText = Ix.toFixed(2);
    document.getElementById('resImax').innerText = Imax.toFixed(2);
    document.getElementById('resImin').innerText = Imin.toFixed(2);
    document.getElementById('resix').innerText = ix.toFixed(2);
    document.getElementById('resimin').innerText = imin.toFixed(2);

    // 4. Şekli Çiz
    drawAngle(a_mm, t_mm, cx*10); // cx'i tekrar mm'ye çevirip gönder
}

function drawAngle(a, t, cx) {
    const canvas = document.getElementById('lCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height); // Temizle
    
    const margin = 20;
    const scale = (canvas.width - 2 * margin) / a;
    
    // Çizim koordinatları (margin kadar ötele)
    const x = margin;
    const y = margin;
    const drawA = a * scale;
    const drawT = t * scale;
    const drawCx = cx * scale;

    // --- 1. Kesit Şeklini Çiz (Mavi) ---
    ctx.beginPath();
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#2c3e50'; // Steel color
    ctx.fillStyle = 'rgba(189, 195, 199, 0.4)'; // Light gray fill

    ctx.moveTo(x, y); // Sol üst dış köşe
    ctx.lineTo(x + drawT, y); // Üst et kalınlığı
    ctx.lineTo(x + drawT, y + drawA - drawT); // İç köşe (yatay et başlangıcı)
    ctx.lineTo(x + drawA, y + drawA - drawT); // Yatay kenar sonu
    ctx.lineTo(x + drawA, y + drawA); // Sağ alt dış köşe
    ctx.lineTo(x, y + drawA); // Sol alt dış köşe
    ctx.closePath();
    
    ctx.fill();
    ctx.stroke();

    // --- 2. Ağırlık Merkezi ($c$) ---
    const cPointX = x + drawCx;
    const cPointY = y + drawA - drawCx; // Y ekseni aşağı doğru olduğu için drawA - drawCx

    ctx.beginPath();
    ctx.arc(cPointX, cPointY, 3, 0, 2 * Math.PI);
    ctx.fillStyle = '#f39c12'; // Gold color
    ctx.fill();
    ctx.fillText("c", cPointX + 5, cPointY - 5);

    // --- 3. Geometrik Eksenler ($x, y$) - Kırmızı ---
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(231, 76, 60, 0.8)'; // Red, semi-transparent
    
    // x ekseni (yatay)
    ctx.beginPath();
    ctx.moveTo(margin / 2, cPointY);
    ctx.lineTo(canvas.width - margin / 2, cPointY);
    ctx.stroke();
    ctx.fillStyle = '#e74c3c';
    ctx.fillText("x", canvas.width - margin / 2, cPointY + 3);

    // y ekseni (dikey)
    ctx.beginPath();
    ctx.moveTo(cPointX, margin / 2);
    ctx.lineTo(cPointX, canvas.width - margin / 2); // Canvas kare, width=height
    ctx.stroke();
    ctx.fillText("y", cPointX - 10, margin / 2);

    // --- 4. Asal Eksenler ($u, v$) - Yeşil ---
    ctx.strokeStyle = 'rgba(46, 204, 113, 0.9)'; // Green
    
    // u ekseni ($Imax$ - diagonal)
    ctx.beginPath();
    ctx.moveTo(x, y + drawA); // Dış köşe
    ctx.lineTo(x + drawA, y); // Karşı boşluk
    ctx.stroke();
    ctx.fillStyle = '#2ecc71';
    ctx.fillText("u", x + drawA - 10, y + 10);

    // v ekseni ($Imin$ - zayıf eksen)
    ctx.beginPath();
    ctx.moveTo(cPointX - drawCx * 0.7, cPointY - drawCx * 0.7); // Yaklaşık diagonal çizgi
    ctx.lineTo(cPointX + drawCx * 1.5, cPointY + drawCx * 1.5); // c merkezli diagonal
    ctx.stroke();
    ctx.fillText("v", cPointX + drawCx * 1.5, cPointY + drawCx * 1.5 + 10);
}

// Sayfa yüklendiğinde varsayılan değerlerle (50x50x5) bir kez hesapla
calculateAndUpdate();
</script>

</body>
</html>
