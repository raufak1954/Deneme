<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rauf'un Pedometresi</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding-top: 50px; }
        .circle { width: 200px; height: 200px; border: 10px solid #1a73e8; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; background: white; }
        #stepCount { font-size: 48px; font-weight: bold; color: #1a73e8; }
        button { padding: 15px 30px; font-size: 18px; border-radius: 8px; border: none; background: #1a73e8; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div class="circle">
        <span id="stepCount">0</span>
    </div>
    <p>Bugünkü Adımlarınız</p>
    <button onclick="startPedometer()">Sensörü Başlat</button>

    <script>
        let steps = 0;
        let lastAcceleration = 0;

        function startPedometer() {
            // iOS cihazlarda sensör erişimi için izin istenir
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        listenMotion();
                    }
                });
            } else {
                listenMotion();
            }
        }

        function listenMotion() {
            window.addEventListener('devicemotion', (event) => {
                let acc = event.accelerationIncludingGravity;
                let totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                
                // Basit bir eşik değer (threshold) kontrolü
                let delta = Math.abs(totalAcc - lastAcceleration);
                if (delta > 5) { // Hassasiyeti buradan ayarlayabilirsin
                    steps++;
                    document.getElementById('stepCount').innerText = Math.floor(steps / 2);
                }
                lastAcceleration = totalAcc;
            });
        }
    </script>
</body>
</html>
