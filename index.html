<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Hesaplayıcı</title>
    <style>
        /* Modern ve temiz bir görünüm için CSS */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 80px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin: 5px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #007bff; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #sonuc { margin-top: 20px; font-size: 1.5rem; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>Matematik Aracı</h2>
    <input type="number" id="a" placeholder="A">
    <span>+</span>
    <input type="number" id="b" placeholder="B">
    <br><br>
    <button onclick="hesapla()">HESAPLA</button>
    <div id="sonuc">Sonuç: -</div>
</div>

<script>
    function hesapla() {
        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        document.getElementById("sonuc").innerText = "Sonuç: " + (a + b);
    }
</script>

</body>
</html>
