<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aircraft Design Master - Engineering Edition</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 30px; color: #000; background: #fff; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #000; padding: 25px; }
        h1, h2 { text-align: center; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 25px; }
        .group { display: flex; flex-direction: column; border: 1px dotted #ccc; padding: 8px; }
        label { font-size: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        input { padding: 5px; border: 1px solid #000; font-size: 13px; }
        .calc-btn { width: 100%; padding: 18px; background: #000; color: #fff; border: none; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-family: 'Courier New', monospace; }
        th, td { border: 1px solid #000; padding: 10px; text-align: left; font-size: 14px; }
        .header-black { background: #000; color: #fff; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>Aircraft Design & Stability Master</h1>

    <h2>1. Required Design Inputs</h2>
    <div class="grid">
        <div class="group"><label>MTOW (N)</label><input type="number" id="W" value="6000"></div>
        <div class="group"><label>Fuel (N)</label><input type="number" id="Wf" value="600"></div>
        <div class="group"><label>Power (HP)</label><input type="number" id="HP" value="100"></div>
        <div class="group"><label>RPM</label><input type="number" id="RPM" value="2263"></div>
        
        <div class="group"><label>Span (m)</label><input type="number" id="b" value="8.7"></div>
        <div class="group"><label>Area (S) [m²]</label><input type="number" id="S" value="10.88"></div>
        <div class="group"><label>Chord (c) [m]</label><input type="number" id="c" value="1.25"></div>
        <div class="group"><label>Airfoil Cl-alpha</label><input type="number" id="cla2d" value="6.28" step="0.01"></div>

        <div class="group"><label>Fuselage Width (m)</label><input type="number" id="wf" value="1.2"></div>
        <div class="group"><label>Fuselage Len (m)</label><input type="number" id="Lf" value="6.0"></div>
        <div class="group"><label>Tail Area (Sh)</label><input type="number" id="Sh" value="1.81"></div>
        <div class="group"><label>Tail Arm (Lh)</label><input type="number" id="Lh" value="4.5"></div>

        <div class="group"><label>Cd0 (Parasite)</label><input type="number" id="Cd0" value="0.0331" step="0.0001"></div>
        <div class="group"><label>Oswald (e)</label><input type="number" id="e" value="0.84" step="0.01"></div>
        <div class="group"><label>CG (% chord)</label><input type="number" id="Xcg" value="30"></div>
        <div class="group"><label>Downwash (dE/dA)</label><input type="number" id="deda" value="0.384" step="0.001"></div>
    </div>

    <button class="calc-btn" onclick="runMasterCalc()">Compute Full Technical Report</button>

    <h2>2. Integrated Results</h2>
    <table>
        <tr class="header-black"><th colspan="3">AERODYNAMICS & STABILITY</th></tr>
        <tbody id="res-aero"></tbody>
        <tr class="header-black"><th colspan="3">PERFORMANCE & RANGE</th></tr>
        <tbody id="res-perf"></tbody>
    </table>
</div>

<script>
function runMasterCalc() {
    // 1. Inputs
    const W = parseFloat(document.getElementById('W').value);
    const Wf = parseFloat(document.getElementById('Wf').value);
    const HP = parseFloat(document.getElementById('HP').value);
    const RPM = parseFloat(document.getElementById('RPM').value);
    const b = parseFloat(document.getElementById('b').value);
    const S = parseFloat(document.getElementById('S').value);
    const c = parseFloat(document.getElementById('c').value);
    const cla2d = parseFloat(document.getElementById('cla2d').value);
    const wf = parseFloat(document.getElementById('wf').value);
    const Lf = parseFloat(document.getElementById('Lf').value);
    const Sh = parseFloat(document.getElementById('Sh').value);
    const Lh = parseFloat(document.getElementById('Lh').value);
    const Cd0 = parseFloat(document.getElementById('Cd0').value);
    const e = parseFloat(document.getElementById('e').value);
    const Xcg = parseFloat(document.getElementById('Xcg').value) / 100;
    const deda = parseFloat(document.getElementById('deda').value);

    // 2. Logic (3D Wing CL-alpha calculation)
    const AR = Math.pow(b, 2) / S;
    const Cla3D = cla2d / (1 + (cla2d / (Math.PI * AR * e))); // Lifting line correction
    
    // Fuselage Effect (Multhopp)
    const Cmaf = (0.00953 * Math.pow(wf, 2) * Lf) / (S * c);

    // Stability (Roskam)
    const Vh = (Lh * Sh) / (S * c);
    const Xnp = 0.25 + (Vh * (3.629/Cla3D) * (1 - deda)) - (Cmaf / Cla3D);
    const SM = (Xnp - Xcg) * 100;

    // Performance
    const rho = 1.225;
    const Vs_kts = Math.sqrt((2 * W) / (rho * S * 1.45)) * 1.944;
    const T_static = (HP * 745.7 / (rho * Math.pow(RPM/60, 3) * Math.pow(1.7, 5))) * 1.214 * rho * Math.pow(RPM/60, 2) * Math.pow(1.7, 4);
    const Endurance = (Wf / (HP * 745.7 * 0.75 * 0.00000078)) / 3600;

    // 3. Render
    document.getElementById('res-aero').innerHTML = `
        <tr><td>Aspect Ratio (AR)</td><td>${AR.toFixed(2)}</td><td>[-]</td></tr>
        <tr><td>Wing CL-alpha (3D)</td><td>${Cla3D.toFixed(3)}</td><td>rad⁻¹ (Corrected for AR)</td></tr>
        <tr><td>Neutral Point (Xnp)</td><td>${(Xnp * 100).toFixed(1)}</td><td>% chord</td></tr>
        <tr><td><b>Static Margin</b></td><td><b>${SM.toFixed(1)}</b></td><td><b>% (Stable if Positive)</b></td></tr>
    `;
    document.getElementById('res-perf').innerHTML = `
        <tr><td>Static Thrust</td><td>${T_static.toFixed(0)}</td><td>Newtons</td></tr>
        <tr><td>Stall Speed</td><td>${Vs_kts.toFixed(1)}</td><td>Knots</td></tr>
        <tr><td>Endurance (75% Power)</td><td>${Endurance.toFixed(1)}</td><td>Hours</td></tr>
        <tr><td>Range (Est)</td><td>${(Endurance * Vs_kts * 2).toFixed(0)}</td><td>Nautical Miles</td></tr>
    `;
}
</script>
</body>
</html>
