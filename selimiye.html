<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; font-weight: bold; }
        .container { max-width: 800px; margin: auto; }
        table { width: 100%; border-collapse: collapse; background: white; margin-bottom: 30px; }
        th, td { padding: 12px; border: 1px solid #000; text-align: center; text-transform: uppercase; }
        th { background: #007bff; color: white; }
        .map-container { background: white; padding: 10px; border: 1px solid #000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { text-transform: uppercase; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3><b>SELIMIYE 16-DAY FORECAST</b></h3>
    <table>
        <thead>
            <tr>
                <th><b>DAY</b></th>
                <th><b>MAX / MIN</b></th>
                <th><b>RAIN</b></th>
                <th><b>GUSTS</b></th>
            </tr>
        </thead>
        <tbody id="data-rows"></tbody>
    </table>

    <h3><b>SURFACE PRESSURE & ISOBARS</b></h3>
    <div class="map-container">
        <iframe 
            width="100%" 
            height="450" 
            src="https://embed.windy.com/embed2.html?lat=36.70&lon=28.11&zoom=5&level=surface&overlay=pressure&menu=&message=true&marker=true&calendar=now&pressure=true&type=map&location=coordinates&detail=true&metricWind=kn&metricTemp=%C2%B0C&radarRange=-1" 
            frameborder="0">
        </iframe>
    </div>
</div>

<script>
    const lat = 36.70;
    const lon = 28.11;
    const days = ["SUNDAY", "MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY"];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_gusts_10m_max&wind_speed_unit=kn&timezone=auto&forecast_days=16`;

    fetch(url)
        .then(res => res.json())
        .then(data => {
            let rows = "";
            const d = data.daily;
            for (let i = 0; i < d.time.length; i++) {
                const dateObj = new Date(d.time[i]);
                const dayName = days[dateObj.getDay()];
                rows += `<tr>
                    <td><b>${dayName}</b></td>
                    <td><b>${Math.round(d.temperature_2m_max[i])} / ${Math.round(d.temperature_2m_min[i])}</b></td>
                    <td><b>${Math.round(d.precipitation_sum[i])}</b></td>
                    <td><b>${Math.round(d.wind_gusts_10m_max[i])}</b></td>
                </tr>`;
            }
            document.getElementById('data-rows').innerHTML = rows;
        });
</script>

</body>
</html>
