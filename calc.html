<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rauf - Mühendislik Hesap Makinesi</title>
    <style>
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .calc-body { background: #1e1e1e; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 320px; }
        #display { width: 100%; height: 60px; background: transparent; border: none;
            color: white; text-align: right; font-size: 32px; margin-bottom: 20px;
            outline: none; padding-right: 10px; box-sizing: border-box;
        }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 60px; border-radius: 12px; border: none; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        /* Renk Grupları */
        .num { background: #333; color: white; }
        .op { background: #f39c12; color: white; }
        .func { background: #555; color: #00d2ff; }
        .equal { background: #27ae60; color: white; grid-column: span 2; }
        .clear { background: #c0392b; color: white; }
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>
<div class="calc-body">
    <input type="text" id="display" disabled value="0">
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="func" onclick="append('Math.sqrt(')">√</button>
        <button class="func" onclick="append('**')">^</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('*')">×</button>
        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="append('-')">-</button>
        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
        <button class="op" onclick="append('+')">+</button>
        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
        <button class="equal" onclick="solve()">=</button>
        <button class="func" onclick="append('Math.PI')">π</button>
        <button class="func" onclick="appendTrigFunction('Math.sin')">sin</button>
        <button class="func" onclick="appendTrigFunction('Math.cos')">cos</button>
        <button class="func" onclick="append('Math.log10(')">log</button>
        <!-- New Buttons -->
        <button class="func" onclick="toggleDegreeMode()">Degrees</button>
        <button class="func" onclick="alert('Example Button')">Second</button>
    </div>
</div>
<script>
    let display = document.getElementById('display');
    let inDegrees = false; // Track whether inputs are in degrees
    function append(val) {
        if (display.value === "0") display.value = val;
        else display.value += val;
    }
    function clearDisplay() {
        display.value = "0";
    }
    function solve() {
        try {
            let expression = display.value;
            let openBrackets = (expression.match(/\(/g) || []).length;
            let closeBrackets = (expression.match(/\)/g) || []).length;
            for(let i = 0; i < (openBrackets - closeBrackets); i++) {
                expression += ")";
            }
            display.value = eval(expression);
        } catch (e) {
            display.value = "Hata";
            setTimeout(clearDisplay, 1500);
        }
    }
    function toggleDegreeMode() {
        inDegrees = !inDegrees;
        const button = document.querySelector('.func[onclick="toggleDegreeMode()"]');
        button.textContent = inDegrees ? "Radians" : "Degrees";
    }
    function appendTrigFunction(func) {
        if (inDegrees) {
            append(`${func}(Math.PI / 180 * `);
        } else {
            append(`${func}(`);
        }
    }
</script>
</body>
</html>
