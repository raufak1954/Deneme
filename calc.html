<!DOCTYPE html>
<html>
<head>
    <title>Calculator</title>
    <script>
        function deleteLastChar() {
            var display = document.getElementById('display');
            display.value = display.value.slice(0, -1);
        }

        function calculateTangent() {
            var input = document.getElementById('display').value;
            var result = Math.tan(input);
            document.getElementById('display').value = result;
        }

        // Other existing JavaScript functions for the calculator
    </script>
</head>
<body>
    <input type="text" id="display" />
    <button onclick="deleteLastChar()">Backspace</button>
    <button onclick="calculateTangent()">Tangent</button>
    <!-- Other calculator buttons -->
</body>
</html>
